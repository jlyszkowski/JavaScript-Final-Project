<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">🎬 MovieFinder</div>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Browse</a>
        <button class="contact-btn">CONTACT</button>
      </div>
    </nav>

    <section class="hero">
      <h1>The World's Best <span>Movie Database</span></h1>
      <p>FIND YOUR FAVOURITE MOVIE WITH <span>MOVIEFINDER</span></p>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search by Title, Genre or Keyword"
        />
        <button id="search-btn">🔍</button>
      </div>
    </section>

    <section class="results-section">
      <div class="results-header">
        <h2>Search results:</h2>
        <select id="sort-select">
          <option value="">Sort by...</option>
          <option value="az">Alphabetical A to Z</option>
          <option value="za">Alphabetical Z to A</option>
          <option value="newest">Newest to Oldest</option>
          <option value="oldest">Oldest to Newest</option>
        </select>
      </div>
      <div class="movies-grid" id="movies-grid"></div>
    </section>

    <footer class="footer">
      <div class="footer-logo">🎬 MovieFinder</div>
      <p>© 2026 MovieFinder. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">Home</a>
        <a href="#">Browse</a>
        <a href="#">Contact</a>
      </div>
    </footer>

    <script src="index.js"></script>
  </body>
</html>
